  label: MIT CS · YC Founder (S26) · ML Researcher
  email: serenapei123@gmail.com
  location: Cambridge, MA · San Francisco, CA
  image: ""
  summary: >
    I work at the intersection of rigorous machine learning research and high-stakes system engineering.
    I studied computer science and engineering at MIT and am a founder in the Y Combinator S26 batch, where I focus on
    translating deep technical ideas into real world systems.

    My research spans CSAIL, the Media Lab, and LIDS, focusing on distribution shifts in computer
    vision, human computer interaction, multimodal data analysis, and multiagent strategy with LLMs.
    Through engineering work at Amazon and early-stage startups, I've explored human in the loop design
    for LLM-based systems and how to orchestrate agents to produce efficient, rigorous, and interpretable
    outcomes.

    I'm particularly interested in building intelligent systems to solve complex problems, combining
    advances in machine learning with a nuanced understanding of human behavior and strategic decision
    making.

